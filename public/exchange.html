<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exchange - TrustEx</title>
    <link rel="preconnect" href="https://trustex-trade.onrender.com">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/auth.js?v=2" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/balance.js" defer></script>
    <script src="js/prefetch.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/keyboard-nav.js" defer></script>
    <style>body { opacity: 1; }</style>
    <script>(function() { var lang = localStorage.getItem('nexo_lang') || 'ru'; document.documentElement.lang = lang; document.addEventListener('gesturestart', function(e) { e.preventDefault(); }); document.addEventListener('gesturechange', function(e) { e.preventDefault(); }); document.addEventListener('gestureend', function(e) { e.preventDefault(); }); document.addEventListener('touchstart', function(e) { if(e.touches.length > 1) e.preventDefault(); }, { passive: false }); })();</script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-input: #0f1520;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.15);
            --accent-hover: #00eebb;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
            --danger: #ef4444;
            --gold: #fbbf24;
            --rub-gradient: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            --eur-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --usdt-gradient: linear-gradient(135deg, #26a17b 0%, #1a8c6a 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            touch-action: pan-x pan-y;
            -ms-touch-action: pan-x pan-y;
        }

        body {
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
        }

        .app-container {
            max-width: 440px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(180deg);
        }

        .lang-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        /* Currency Selector Dropdown */
        .currency-selector {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .dropdown-arrow {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 2px;
            transition: transform 0.2s ease;
        }

        .currency-selector.open .dropdown-arrow {
            transform: rotate(180deg);
        }

        .currency-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px;
            z-index: 100;
            display: none;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            animation: dropdownIn 0.15s ease;
        }

        .currency-dropdown.visible {
            display: block;
        }

        @keyframes dropdownIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .dropdown-item.active {
            background: rgba(0, 212, 170, 0.1);
        }

        .dropdown-item.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .dropdown-item-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .dropdown-item-info {
            flex: 1;
            min-width: 0;
        }

        .dropdown-item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .dropdown-item-balance {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .dropdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 99;
            display: none;
        }

        .dropdown-overlay.visible {
            display: block;
        }

        /* Quick Amount Buttons */
        .quick-amounts {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .quick-amt-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .quick-amt-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .quick-amt-btn:active {
            transform: scale(0.95);
        }

        /* Live Rate Banner */
        .rate-banner {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rate-banner-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rate-live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .rate-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rate-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        /* Main Exchange Card */
        .exchange-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: visible;
        }

        .exchange-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 24px 24px 0 0;
            background: linear-gradient(90deg, var(--accent), #3b82f6, var(--accent));
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .exchange-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .exchange-title {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .exchange-pair {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, var(--accent) 50%, #26a17b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Currency Blocks */
        .currency-section {
            position: relative;
        }

        .currency-block {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            transition: all 0.3s;
        }

        .currency-block:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .currency-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .currency-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .balance-badge:hover {
            background: var(--accent);
            color: #000;
        }

        .balance-badge .max-label {
            color: var(--accent);
            font-weight: 600;
        }

        .balance-badge:hover .max-label {
            color: #000;
        }

        .currency-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .currency-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .icon-rub {
            background: var(--rub-gradient);
            color: #000;
            box-shadow: 0 8px 24px rgba(251, 191, 36, 0.25);
        }

        .icon-eur {
            background: var(--eur-gradient);
            color: #fff;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }

        .icon-usdt {
            background: var(--usdt-gradient);
            color: #fff;
            box-shadow: 0 8px 24px rgba(38, 161, 123, 0.25);
        }

        .icon-btc {
            background: linear-gradient(135deg, #f7931a 0%, #e8850f 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(247, 147, 26, 0.25);
        }

        .icon-eth {
            background: linear-gradient(135deg, #627eea 0%, #4a6cd4 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(98, 126, 234, 0.25);
        }

        .icon-ton {
            background: linear-gradient(135deg, #0088cc 0%, #0070aa 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 136, 204, 0.25);
        }

        .currency-input-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .currency-name {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .amount-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 700;
            width: 100%;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .amount-input::placeholder {
            color: var(--text-muted);
        }

        /* Swap Button */
        .swap-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 0;
            position: relative;
            z-index: 10;
        }

        .swap-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
            color: #000;
            border: 4px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.3);
        }

        .swap-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(0, 212, 170, 0.4);
        }

        .swap-btn:active {
            transform: scale(0.95);
        }

        .swap-btn.rotated svg {
            transform: rotate(180deg);
        }

        .swap-btn svg {
            transition: transform 0.3s ease;
        }

        .currency-gap {
            height: 6px;
        }

        /* Exchange Details */
        .exchange-details {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .detail-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .detail-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .detail-value.accent {
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
        }

        .detail-divider {
            height: 1px;
            background: var(--border);
        }

        /* Exchange Button */
        .exchange-btn {
            width: 100%;
            padding: 18px 24px;
            margin-top: 20px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .exchange-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .exchange-btn:hover::before {
            left: 100%;
        }

        .exchange-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 212, 170, 0.35);
        }

        .exchange-btn:active {
            transform: translateY(-1px);
        }

        .exchange-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .exchange-btn-icon {
            display: flex;
            align-items: center;
        }

        /* Features row */
        .features-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
        }

        /* Exchange History */
        .history-section {
            margin-top: 24px;
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .history-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .history-badge {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 3px 8px;
            border-radius: 10px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
        }
        .history-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .history-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--accent);
        }
        .history-info {
            flex: 1;
            min-width: 0;
        }
        .history-desc {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .history-amount {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }
        .history-empty {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-muted);
            font-size: 13px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .feature-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        .feature-chip svg {
            width: 14px;
            height: 14px;
            fill: var(--accent);
            flex-shrink: 0;
        }

        /* Alert - Professional Exchange Style */
        #topAlert {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            min-width: 340px;
            max-width: 420px;
            padding: 16px 20px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease-out;
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            touch-action: none;
        }
        
        #topAlert .notif-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        #topAlert .notif-icon svg {
            width: 14px;
            height: 14px;
            fill: #fff;
        }
        
        #topAlert .notif-text {
            flex: 1;
            line-height: 1.4;
        }

        #topAlert.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        
        #topAlert.success {
            background: #1e3a2f;
            border: 1px solid #2d5a45;
            color: #4ade80;
        }
        
        #topAlert.success .notif-icon {
            background: #22c55e;
        }
        
        #topAlert.error {
            background: #3a1e1e;
            border: 1px solid #5a2d2d;
            color: #f87171;
        }
        
        #topAlert.error .notif-icon {
            background: #ef4444;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .exchange-card {
            animation: fadeInUp 0.5s ease;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-top: 1px solid rgba(48, 54, 61, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 0 max(16px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 70px;
        }
        
        /* Hide nav when input is focused */
        body.input-focused .bottom-nav {
            display: none !important;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #6e7681;
            padding: 8px 0;
            border-radius: 12px;
            transition: color 0.15s ease;
            width: 20%;
            height: 46px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item:hover { color: #8b949e; }
        .nav-item.active { color: var(--accent); }

        .nav-item::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .nav-item.active::before {
            opacity: 1;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .nav-label { font-size: 10px; font-weight: 500; }
    </style>
</head>
<body>

<div id="topAlert"></div>
<div class="dropdown-overlay" id="dropdownOverlay" onclick="closeAllDropdowns()"></div>

<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()">← <span data-i18n="back">Назад</span></button>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn" title="Обновить"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></button>
        </div>
    </div>

    <!-- Live Rate Banner -->
    <div class="rate-banner">
        <div class="rate-banner-left">
            <div class="rate-live-dot"></div>
            <span class="rate-label" data-i18n="onlineRate">Курс онлайн</span>

        <span class="rate-value" id="liveRate">1 RUB = 0.012642 USDT</span>

    <!-- Main Exchange Card -->
    <div class="exchange-card">
        <div class="exchange-header">
            <div class="exchange-title" data-i18n="instantExchange">Мгновенный обмен</div>
            <div class="exchange-pair" id="exchangePair">RUB → USDT</div>
        </div>

        <div class="currency-section">
            <!-- From Currency -->
            <div class="currency-block" id="fromBlock">
                <div class="currency-block-header">
                    <span class="currency-label" id="fromLabel" data-i18n="youGive">Отдаёте</span>
                    <div class="balance-badge" id="fromBalance" onclick="selectAll()">
                        <span><span data-i18n="balanceLabel">Баланс</span>: <span id="fromBalanceValue">0.00</span></span>
                        <span class="max-label">MAX</span>
                    </div>
                </div>
                <div class="currency-selector" id="fromSelector" onclick="toggleDropdown('from')">
                    <div class="currency-icon icon-rub" id="fromIcon">₽</div>
                    <div class="currency-input-wrap">
                        <div class="currency-name" id="fromName" data-i18n="rub">Российский рубль <span class="dropdown-arrow">▼</span></div>
                        <input type="number" class="amount-input" id="amountInput" placeholder="0.00" inputmode="decimal" onclick="event.stopPropagation()">
                    </div>
                    <div class="currency-dropdown" id="fromDropdown"></div>
                </div>
                <div class="quick-amounts">
                    <button class="quick-amt-btn" onclick="setPercent(25)">25%</button>
                    <button class="quick-amt-btn" onclick="setPercent(50)">50%</button>
                    <button class="quick-amt-btn" onclick="setPercent(75)">75%</button>
                    <button class="quick-amt-btn" onclick="setPercent(100)">MAX</button>
                </div>
            </div>

            <!-- Swap Button -->
            <div class="swap-container">
                <button class="swap-btn" id="swapBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg></button>
            </div>

            <div class="currency-gap"></div>

            <!-- To Currency -->
            <div class="currency-block" id="toBlock">
                <div class="currency-block-header">
                    <span class="currency-label" id="toLabel" data-i18n="youReceive">Получаете</span>
                    <div class="balance-badge" style="cursor: default; background: transparent;">
                        <span><span data-i18n="balanceLabel">Баланс</span>: <span id="toBalanceValue">0.00</span></span>
                    </div>
                </div>
                <div class="currency-selector" id="toSelector" onclick="toggleDropdown('to')">
                    <div class="currency-icon icon-usdt" id="toIcon">₮</div>
                    <div class="currency-input-wrap">
                        <div class="currency-name" id="toName">Tether USDT <span class="dropdown-arrow">▼</span></div>
                        <div class="amount-input" id="resultAmount" style="color: var(--accent);">0.00</div>
                    </div>
                    <div class="currency-dropdown" id="toDropdown"></div>
                </div>
            </div>
        </div>

        <!-- Exchange Details -->
        <div class="exchange-details">
            <div class="detail-row">
                <span class="detail-label" data-i18n="commission">Комиссия</span>
                <span class="detail-value" style="color: var(--success);">0%</span>
            </div>
            <div class="detail-row">
                <span class="detail-label" data-i18n="exchangeTime">Время обмена</span>
                <span class="detail-value">~1 <span data-i18n="sec">сек</span></span>
            </div>
            <div class="detail-divider"></div>
            <div class="detail-row">
                <span class="detail-label" id="youGetLabel" data-i18n="youWillGet">Вы получите</span>
                <span class="detail-value accent" id="resultPreview">0.00 USDT</span>
            </div>
        </div>

        <!-- Exchange Button -->
        <button class="exchange-btn" id="exchangeBtn">
            <span class="exchange-btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg></span>
            <span data-i18n="exchangeBtn">Обменять</span>
        </button>

        <!-- Features -->
        <div class="features-row">
            <div class="feature-chip">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                <span data-i18n="secure">Безопасно</span>
            </div>
            <div class="feature-chip">
                <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
                <span data-i18n="instant">Мгновенно</span>
            </div>
            <div class="feature-chip">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                <span data-i18n="bestRate">Лучший курс</span>
            </div>
        </div>
    </div>

    <!-- Exchange History -->
    <div class="history-section" id="historySection" style="display:none">
        <div class="history-header">
            <span class="history-title" data-i18n="exchangeHistory">История обменов</span>
            <span class="history-badge" id="historyCount"></span>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

let userId = null;

const amountInput = document.getElementById('amountInput');
const resultAmount = document.getElementById('resultAmount');
const resultPreview = document.getElementById('resultPreview');
const exchangePair = document.getElementById('exchangePair');
const liveRate = document.getElementById('liveRate');
const swapBtn = document.getElementById('swapBtn');
const exchangeBtn = document.getElementById('exchangeBtn');
const refreshBtn = document.getElementById('refreshBtn');
const topAlert = document.getElementById('topAlert');

const fromIcon = document.getElementById('fromIcon');
const fromName = document.getElementById('fromName');
const fromBalanceValue = document.getElementById('fromBalanceValue');
const toIcon = document.getElementById('toIcon');
const toName = document.getElementById('toName');
const toBalanceValue = document.getElementById('toBalanceValue');

// Currency metadata
const CUR_META = {
    USDT: { symbol: '₮', name: 'Tether USDT',       icon: 'icon-usdt', char: '₮', decimals: 2 },
    BTC:  { symbol: '₿', name: 'Bitcoin',            icon: 'icon-btc',  char: '₿', decimals: 8 },
    ETH:  { symbol: 'Ξ', name: 'Ethereum',           icon: 'icon-eth',  char: 'Ξ', decimals: 8 },
    TON:  { symbol: '💎', name: 'Toncoin',           icon: 'icon-ton',  char: '💎', decimals: 4 },
    RUB:  { symbol: '₽', name: 'Российский рубль',   icon: 'icon-rub',  char: '₽', decimals: 2 },
    EUR:  { symbol: '€', name: 'Euro',                icon: 'icon-eur',  char: '€', decimals: 2 }
};

// State
let balances = { USDT: 0, BTC: 0, ETH: 0, TON: 0, RUB: 0, EUR: 0 };
let rates = { USDT: 1, BTC: 60000, ETH: 3000, TON: 5, RUB: 0.012, EUR: 1.089 };
let selectedFrom = 'RUB';
let selectedTo = 'USDT';

function setFromCurrency(cur) {
    if (cur === selectedTo) return;
    selectedFrom = cur;
    amountInput.value = '';
    updateDisplay();
}

function setToCurrency(cur) {
    if (cur === selectedFrom) return;
    selectedTo = cur;
    amountInput.value = '';
    updateDisplay();
}

function buildDropdownItems(type) {
    const dropdown = document.getElementById(type + 'Dropdown');
    const activeCur = type === 'from' ? selectedFrom : selectedTo;
    const disabledCur = type === 'from' ? selectedTo : selectedFrom;
    let html = '';
    for (const cur of Object.keys(CUR_META)) {
        const m = CUR_META[cur];
        const bal = (balances[cur] || 0).toFixed(m.decimals);
        const isActive = cur === activeCur;
        const isDisabled = cur === disabledCur;
        let cls = 'dropdown-item';
        if (isActive) cls += ' active';
        if (isDisabled) cls += ' disabled';
        html += `<div class="${cls}" onclick="event.stopPropagation(); selectDropdownCurrency('${type}', '${cur}')">
            <div class="dropdown-item-icon ${m.icon}">${m.char}</div>
            <div class="dropdown-item-info">
                <div class="dropdown-item-name">${cur}</div>
                <div class="dropdown-item-balance">${bal} ${cur}</div>
            </div>
        </div>`;
    }
    dropdown.innerHTML = html;
}

function toggleDropdown(type) {
    const selector = document.getElementById(type + 'Selector');
    const dropdown = document.getElementById(type + 'Dropdown');
    const overlay = document.getElementById('dropdownOverlay');
    const otherType = type === 'from' ? 'to' : 'from';
    const otherDropdown = document.getElementById(otherType + 'Dropdown');
    const otherSelector = document.getElementById(otherType + 'Selector');

    // Close the other dropdown if open
    otherDropdown.classList.remove('visible');
    otherSelector.classList.remove('open');

    const isOpen = dropdown.classList.contains('visible');
    if (isOpen) {
        dropdown.classList.remove('visible');
        selector.classList.remove('open');
        overlay.classList.remove('visible');
    } else {
        buildDropdownItems(type);
        dropdown.classList.add('visible');
        selector.classList.add('open');
        overlay.classList.add('visible');
    }
}

function selectDropdownCurrency(type, cur) {
    if (type === 'from') {
        setFromCurrency(cur);
    } else {
        setToCurrency(cur);
    }
    closeAllDropdowns();
}

function closeAllDropdowns() {
    document.getElementById('fromDropdown').classList.remove('visible');
    document.getElementById('toDropdown').classList.remove('visible');
    document.getElementById('fromSelector').classList.remove('open');
    document.getElementById('toSelector').classList.remove('open');
    document.getElementById('dropdownOverlay').classList.remove('visible');
}

function setPercent(pct) {
    const bal = balances[selectedFrom] || 0;
    const val = bal * pct / 100;
    amountInput.value = val > 0 ? parseFloat(val.toFixed(CUR_META[selectedFrom].decimals)) : '';
    updateDisplay();
}

function selectAll() {
    amountInput.value = balances[selectedFrom] || 0;
    updateDisplay();
}

function getClientTelegramId() {
    const telegramRawId = tg?.initDataUnsafe?.user?.id;
    if (telegramRawId) return Number(telegramRawId);
    const key = 'nexo_guest_telegram_id';
    const stored = localStorage.getItem(key);
    if (stored) return Number(stored);
    const generated = Date.now() * 1000 + Math.floor(Math.random() * 1000);
    localStorage.setItem(key, String(generated));
    return generated;
}

async function resolveUserId() {
    const telegramId = getClientTelegramId();
    const res = await fetch('/api/user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegramId })
    });
    const payload = await res.json();
    if (!res.ok || !payload?.data?.telegram_id) throw new Error(payload?.error || 'Failed');
    return payload.data.telegram_id;
}

function showAlert(msg, success = false) {
    const icons = {
        success: '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
        error: '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>'
    };
    const cleanMsg = msg.replace(/^[✅❌⚠️🎉\s]+/, '');
    
    topAlert.innerHTML = `
        <div class="notif-icon">${success ? icons.success : icons.error}</div>
        <div class="notif-text">${cleanMsg}</div>
    `;
    topAlert.className = success ? 'success' : 'error';
    topAlert.classList.add('show');
    
    let startY = 0, currentY = 0, timeout, isDragging = false;
    topAlert.ontouchstart = e => { e.preventDefault(); e.stopPropagation(); startY = e.touches[0].clientY; isDragging = true; clearTimeout(timeout); topAlert.style.transition = 'none'; };
    topAlert.ontouchmove = e => {
      e.preventDefault(); e.stopPropagation();
      if (!isDragging) return;
      currentY = e.touches[0].clientY - startY;
      if (currentY < 0) {
        topAlert.style.transform = `translateX(-50%) translateY(${currentY}px)`;
        topAlert.style.opacity = Math.max(0, 1 - Math.abs(currentY) / 100);
      }
    };
    topAlert.ontouchend = () => {
      isDragging = false;
      topAlert.style.transition = 'all 0.25s ease-out';
      if (currentY < -50) {
        topAlert.style.transform = 'translateX(-50%) translateY(-120px)';
        topAlert.style.opacity = '0';
        setTimeout(() => { topAlert.classList.remove('show'); topAlert.style.transform = ''; topAlert.style.opacity = ''; }, 250);
      } else {
        topAlert.style.transform = ''; topAlert.style.opacity = '';
        timeout = setTimeout(() => topAlert.classList.remove('show'), 3000);
      }
      currentY = 0;
    };
    timeout = setTimeout(() => topAlert.classList.remove('show'), 3000);
}

function updateDisplay() {
    const val = parseFloat(amountInput.value) || 0;
    const fm = CUR_META[selectedFrom];
    const tm = CUR_META[selectedTo];

    // Compute rate: 1 FROM = X TO
    const fromUsdt = rates[selectedFrom] || 1;
    const toUsdt = rates[selectedTo] || 1;
    const pairRate = fromUsdt / toUsdt;
    const result = val * pairRate;

    // Exchange pair header
    exchangePair.innerText = `${selectedFrom} → ${selectedTo}`;

    // Live rate
    const ratePrecision = pairRate >= 1000 ? 2 : pairRate >= 1 ? 4 : pairRate >= 0.001 ? 6 : 8;
    liveRate.innerText = `1 ${selectedFrom} = ${pairRate.toFixed(ratePrecision)} ${selectedTo}`;

    // Result
    resultAmount.innerText = result.toFixed(tm.decimals);
    resultPreview.innerText = `${result.toFixed(tm.decimals)} ${selectedTo}`;

    // From block
    fromIcon.className = 'currency-icon ' + fm.icon;
    fromIcon.innerText = fm.char;
    fromName.innerHTML = fm.name + ' <span class="dropdown-arrow">▼</span>';
    fromBalanceValue.innerText = (balances[selectedFrom] || 0).toFixed(fm.decimals) + ' ' + selectedFrom;

    // To block
    toIcon.className = 'currency-icon ' + tm.icon;
    toIcon.innerText = tm.char;
    toName.innerHTML = tm.name + ' <span class="dropdown-arrow">▼</span>';
    toBalanceValue.innerText = (balances[selectedTo] || 0).toFixed(tm.decimals) + ' ' + selectedTo;
}

swapBtn.addEventListener('click', () => {
    const tmp = selectedFrom;
    selectedFrom = selectedTo;
    selectedTo = tmp;
    closeAllDropdowns();
    amountInput.value = '';
    updateDisplay();
});

async function loadData() {
    if (!userId) return;
    try {
        refreshBtn.style.transform = 'rotate(360deg)';

        const response = await fetch(`/api/profile/${userId}?t=${Date.now()}`);
        const payload = await response.json();
        const data = payload?.data || {};
        if (!payload.error) {
            balances.RUB  = parseFloat(data.rub)  || 0;
            balances.EUR  = parseFloat(data.eur)  || 0;
            balances.USDT = parseFloat(data.usdt) || 0;
            balances.BTC  = parseFloat(data.btc)  || 0;
            balances.ETH  = parseFloat(data.eth)  || 0;
            balances.TON  = parseFloat(data.ton)  || 0;
            if (window.USER_BALANCES) {
                window.USER_BALANCES.rub  = balances.RUB;
                window.USER_BALANCES.eur  = balances.EUR;
                window.USER_BALANCES.usdt = balances.USDT;
                window.USER_BALANCES.btc  = balances.BTC;
                window.USER_BALANCES.eth  = balances.ETH;
                window.USER_BALANCES.ton  = balances.TON;
            }
        }
    } catch (e) { /* silent */ }
    finally {
        setTimeout(() => { refreshBtn.style.transform = ''; }, 300);
        updateDisplay();
    }
}

exchangeBtn.onclick = async function() {
    const amount = parseFloat(amountInput.value) || 0;
    if (amount <= 0) return showAlert("Введите сумму для обмена");
    if (selectedFrom === selectedTo) return showAlert("Выберите разные валюты");
    if (amount > (balances[selectedFrom] || 0)) return showAlert("Недостаточно средств");

    try {
        exchangeBtn.disabled = true;
        exchangeBtn.innerHTML = '<span class="exchange-btn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="#000" style="animation:spin 1s linear infinite"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></span> Обработка...';

        const response = await fetch('/api/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, amount, from: selectedFrom, to: selectedTo })
        });
        const result = await response.json();

        if (response.ok) {
            showAlert("Обмен выполнен успешно!", true);
            amountInput.value = "";
            if (result.data?.newBalances) {
                const nb = result.data.newBalances;
                balances.RUB  = nb.rub  ?? balances.RUB;
                balances.EUR  = nb.eur  ?? balances.EUR;
                balances.USDT = nb.usdt ?? balances.USDT;
                balances.BTC  = nb.btc  ?? balances.BTC;
                balances.ETH  = nb.eth  ?? balances.ETH;
                balances.TON  = nb.ton  ?? balances.TON;
                if (window.USER_BALANCES) {
                    window.USER_BALANCES.rub  = balances.RUB;
                    window.USER_BALANCES.eur  = balances.EUR;
                    window.USER_BALANCES.usdt = balances.USDT;
                    window.USER_BALANCES.btc  = balances.BTC;
                    window.USER_BALANCES.eth  = balances.ETH;
                    window.USER_BALANCES.ton  = balances.TON;
                }
            }
            if (typeof BalanceManager !== 'undefined') await BalanceManager.refresh();
            if (window.USER_BALANCES) {
                balances.RUB  = window.USER_BALANCES.rub  || balances.RUB;
                balances.EUR  = window.USER_BALANCES.eur  || balances.EUR;
                balances.USDT = window.USER_BALANCES.usdt || balances.USDT;
                balances.BTC  = window.USER_BALANCES.btc  || balances.BTC;
                balances.ETH  = window.USER_BALANCES.eth  || balances.ETH;
                balances.TON  = window.USER_BALANCES.ton  || balances.TON;
            }
            updateDisplay();
            loadExchangeHistory();
        } else {
            showAlert(result.error || "Ошибка обмена");
        }
    } catch (err) { showAlert("Ошибка соединения с сервером"); }
    finally {
        exchangeBtn.disabled = false;
        exchangeBtn.innerHTML = '<span class="exchange-btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg></span> Обменять';
    }
};

amountInput.addEventListener('input', updateDisplay);
refreshBtn.onclick = loadData;

function handleTapToDismiss(e) {
    const activeEl = document.activeElement;
    if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
        if (!e.target.closest('input, textarea, button, .btn, select, .quick-amount, .currency-selector')) {
            activeEl.blur();
        }
    }
}
document.addEventListener('touchend', handleTapToDismiss, { passive: true });
document.addEventListener('click', handleTapToDismiss);

function formatHistoryDate(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Только что';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' мин. назад';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч. назад';
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

async function loadExchangeHistory() {
    if (!userId) return;
    try {
        const res = await fetch(`/api/exchange/history/${userId}?limit=10`);
        if (!res.ok) return;
        const json = await res.json();
        const items = json.data || [];
        const section = document.getElementById('historySection');
        const list = document.getElementById('historyList');
        const badge = document.getElementById('historyCount');

        if (items.length === 0) {
            section.style.display = '';
            badge.textContent = '';
            list.innerHTML = '<div class="history-empty">Нет обменов — совершите первый!</div>';
            return;
        }

        section.style.display = '';
        badge.textContent = items.length + ' посл.';

        list.innerHTML = items.map(tx => {
            const desc = tx.description || '';
            const parts = desc.match(/→\s*([\d.]+)\s*(\S+)/);
            const toAmount = parts ? parts[1] : '';
            const toCurrency = parts ? parts[2] : '';
            return `<div class="history-item">
                <div class="history-icon"><svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg></div>
                <div class="history-info">
                    <div class="history-desc">${desc.replace('Обмен ', '')}</div>
                    <div class="history-date">${formatHistoryDate(tx.created_at)}</div>
                </div>
                <div class="history-amount">+${toAmount} ${toCurrency}</div>
            </div>`;
        }).join('');
    } catch (e) { /* silent */ }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        // Load rates from server — the ONLY source of truth for exchange rates
        // This ensures display rates match exact rates used by backend during exchange
        const rateRes = await fetch('/api/exchange/rate');
        if (rateRes.ok) {
            const rateData = await rateRes.json();
            if (rateData?.data?.rates) {
                Object.assign(rates, rateData.data.rates);
            } else if (rateData?.data) {
                rates.RUB = rateData.data.rub_to_usdt || rates.RUB;
                rates.EUR = rateData.data.eur_to_usdt || rates.EUR;
            }
        }

        userId = await resolveUserId();
        await loadData();
        await loadExchangeHistory();
    } catch (e) { /* silent */ }
});
</script>
