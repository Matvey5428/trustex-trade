<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TrustEx Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #fff;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .header h1 {
      font-size: 24px;
      color: #ffd700;
      margin-bottom: 5px;
    }
    
    .header p {
      color: #8892b0;
      font-size: 14px;
    }
    
    .container {
      padding: 15px;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #1a2332 0%, #141c2b 100%);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #4db8ff;
    }
    
    .stat-card .label {
      font-size: 12px;
      color: #8892b0;
      margin-top: 5px;
    }
    
    .section {
      background: linear-gradient(135deg, #1a2332 0%, #141c2b 100%);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #ffd700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .user-card {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .user-card:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .user-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    
    .user-name {
      font-weight: 600;
      font-size: 15px;
    }
    
    .user-id {
      font-size: 12px;
      color: #8892b0;
    }
    
    .user-balance {
      text-align: right;
    }
    
    .user-balance .amount {
      font-weight: 600;
      color: #4db8ff;
    }
    
    .user-balance .mode {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 10px;
      margin-top: 5px;
      display: inline-block;
    }
    
    .mode-win {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
    }
    
    .mode-loss {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
    }
    
    .invoice-card {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 3px solid #ffd700;
    }
    
    .invoice-card.paid {
      border-left-color: #00ff88;
      opacity: 0.7;
    }
    
    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .invoice-user {
      font-weight: 600;
      font-size: 14px;
    }
    
    .invoice-amount {
      font-weight: bold;
      color: #4db8ff;
      font-size: 16px;
    }
    
    .invoice-details {
      font-size: 12px;
      color: #8892b0;
      margin-bottom: 10px;
    }
    
    .invoice-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .status-active {
      background: rgba(255, 215, 0, 0.2);
      color: #ffd700;
    }
    
    .status-paid {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
    }
    
    .btn-confirm {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    
    .btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: #1a2332;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h3 {
      font-size: 18px;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: #8892b0;
      font-size: 24px;
      cursor: pointer;
    }
    
    .modal-body {
      padding: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      color: #8892b0;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #4db8ff;
    }
    
    .mode-buttons {
      display: flex;
      gap: 10px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .mode-btn.win {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
      border: 2px solid transparent;
    }
    
    .mode-btn.win.active {
      border-color: #00ff88;
    }
    
    .mode-btn.loss {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
      border: 2px solid transparent;
    }
    
    .mode-btn.loss.active {
      border-color: #ff4444;
    }
    
    .history-tab {
      flex: 1;
      padding: 6px 8px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 6px;
      color: #8892b0;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .history-tab:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .history-tab.active {
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      color: #fff;
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
    }
    
    .user-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .user-detail-row:last-child {
      border-bottom: none;
    }
    
    .user-detail-label {
      color: #8892b0;
    }
    
    .user-detail-value {
      font-weight: 500;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #8892b0;
    }
    
    .error-msg {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .search-box {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 15px;
    }
    
    .search-box::placeholder {
      color: #8892b0;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 10px;
      color: #8892b0;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      color: #fff;
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2332;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      z-index: 2000;
      display: none;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .toast.success {
      border-color: #00ff88;
    }
    
    .toast.error {
      border-color: #ff4444;
    }
    
    .toast.show {
      display: block;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>👑 TrustEx Admin</h1>
    <p id="roleLabel">Панель управления</p>
  </div>
  
  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="value" id="totalUsers">-</div>
        <div class="label">Пользователей</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalBalance">-</div>
        <div class="label">Общий баланс</div>
      </div>
      <div class="stat-card">
        <div class="value" id="winModeCount">-</div>
        <div class="label">🟢 WIN режим</div>
      </div>
      <div class="stat-card">
        <div class="value" id="lossModeCount">-</div>
        <div class="label">🔴 LOSS режим</div>
      </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs" id="mainTabs">
      <button class="tab active" id="tabUsers" onclick="switchTab('users')">👥 Пользователи</button>
      <button class="tab" id="tabInvoices" onclick="switchTab('invoices')">💳 Оплаты</button>
      <button class="tab" id="tabManagers" onclick="switchTab('managers')" style="display: none;">👤 Менеджеры</button>
    </div>
    
    <!-- Users Section -->
    <div class="section" id="sectionUsers">
      <div class="section-title">👥 Пользователи</div>
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск по ID или имени...">
      <div class="user-list" id="userList">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
    
    <!-- Invoices Section -->
    <div class="section" id="sectionInvoices" style="display: none;">
      <div class="section-title">💳 Ожидающие оплаты</div>
      <div class="user-list" id="invoiceList">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
    
    <!-- Managers Section (Admin only) -->
    <div class="section" id="sectionManagers" style="display: none;">
      <div class="section-title">👤 Менеджеры</div>
      <div style="margin-bottom: 15px;">
        <input type="text" class="search-box" id="managerTelegramId" placeholder="Telegram ID нового менеджера..." style="margin-bottom: 10px;">
        <input type="text" class="search-box" id="managerName" placeholder="Имя менеджера..." style="margin-bottom: 10px;">
        <button class="btn-primary" onclick="addManager()" style="width: 100%;">+ Добавить менеджера</button>
      </div>
      <div class="user-list" id="managerList">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>
  
  <!-- User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalUserName">Пользователь</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="userDetails"></div>
        
        <div class="form-group" id="balanceFormGroup">
          <label>Баланс USDT</label>
          <input type="number" id="newBalance" placeholder="Новый баланс">
        </div>
        
        <div class="form-group" id="modeFormGroup">
          <label>Режим торговли</label>
          <div class="mode-buttons">
            <button class="mode-btn win" id="btnWin" onclick="setMode('win')">🟢 WIN</button>
            <button class="mode-btn loss" id="btnLoss" onclick="setMode('loss')">🔴 LOSS</button>
          </div>
        </div>
        
        <div class="form-group" id="tradingBlockedFormGroup">
          <label>Доступ к торговле</label>
          <div class="mode-buttons">
            <button class="mode-btn" id="btnTradingAllowed" onclick="setTradingBlocked(false)" style="background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%); color: #000;">✅ Разрешить</button>
            <button class="mode-btn" id="btnTradingBlocked" onclick="setTradingBlocked(true)" style="background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%); color: #fff;">⛔ Заблокировать</button>
          </div>
        </div>
        
        <div class="form-group" id="verificationFormGroup">
          <label>Верификация <span id="verifPendingBadge" style="display: none; background: #ff9800; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 8px;">📋 Заявка ожидает</span></label>
          <div class="mode-buttons">
            <button class="mode-btn" id="btnVerifOff" onclick="setVerification('off')" style="background: linear-gradient(135deg, #666 0%, #444 100%); color: #fff;">➖ Не требуется</button>
            <button class="mode-btn" id="btnVerifRequired" onclick="setVerification('required')" style="background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%); color: #000;">⚠️ Требуется</button>
            <button class="mode-btn" id="btnVerifDone" onclick="setVerification('done')" style="background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%); color: #000;">✅ Верифицирован</button>
          </div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button class="btn-primary" id="btnSaveUser" onclick="saveUserChanges()" style="flex: 1;">💾 Сохранить</button>
          <button class="btn-primary" onclick="openChat()" style="flex: 1; background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);">💬 Чат</button>
        </div>
        
        <div style="margin-top: 10px;" id="blockUserBtnContainer">
          <button class="btn-primary" id="btnBlockUser" onclick="toggleBlockUser()" style="width: 100%; background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);">⛔ Заблокировать</button>
        </div>
        
        <!-- User Activity History -->
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
          <div style="font-size: 14px; font-weight: 600; color: #ffd700; margin-bottom: 10px;">📊 История активности</div>
          
          <!-- History Tabs -->
          <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="history-tab active" id="tabAll" onclick="switchHistoryTab('all')">Все</button>
            <button class="history-tab" id="tabDeposits" onclick="switchHistoryTab('deposit')">💰 Депозиты</button>
            <button class="history-tab" id="tabWithdrawals" onclick="switchHistoryTab('withdrawal')">📤 Выводы</button>
            <button class="history-tab" id="tabTrades" onclick="switchHistoryTab('trade')">📈 Сделки</button>
          </div>
          
          <div id="userInvoiceHistory" style="max-height: 300px; overflow-y: auto;">
            <div class="loading" style="font-size: 12px; padding: 10px;">Загрузка...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Toast -->
  <div class="toast" id="toast"></div>
  
  <script>
    const API_BASE = window.location.origin + '/api/admin';
    const tg = window.Telegram?.WebApp;
    
    let currentUser = null;
    let allUsers = [];
    let selectedMode = null;
    let selectedTradingBlocked = false;
    let selectedVerification = 'off'; // 'off' | 'required' | 'done'
    let adminId = null;
    let userRole = 'manager'; // 'admin' or 'manager'
    
    // Init
    if (tg) {
      tg.ready();
      tg.expand();
      adminId = tg.initDataUnsafe?.user?.id;
    }
    
    let currentTab = 'users';
    let allInvoices = [];
    let allManagers = [];
    
    // Load data on start
    document.addEventListener('DOMContentLoaded', async () => {
      await loadRole();
      loadStats();
      loadUsers();
      loadInvoices();
      if (userRole === 'admin') {
        loadManagers();
      }
      
      document.getElementById('searchInput').addEventListener('input', filterUsers);
    });
    
    async function loadRole() {
      try {
        const res = await fetch(`${API_BASE}/role?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          userRole = data.data.role;
          
          // Update UI based on role
          if (userRole === 'admin') {
            document.getElementById('roleLabel').textContent = '👑 Главный админ';
            document.getElementById('tabManagers').style.display = 'block';
          } else {
            document.getElementById('roleLabel').textContent = '👤 Менеджер';
            document.getElementById('tabManagers').style.display = 'none';
          }
        }
      } catch (e) {
        console.error('Role error:', e);
      }
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabUsers').classList.toggle('active', tab === 'users');
      document.getElementById('tabInvoices').classList.toggle('active', tab === 'invoices');
      document.getElementById('tabManagers').classList.toggle('active', tab === 'managers');
      document.getElementById('sectionUsers').style.display = tab === 'users' ? 'block' : 'none';
      document.getElementById('sectionInvoices').style.display = tab === 'invoices' ? 'block' : 'none';
      document.getElementById('sectionManagers').style.display = tab === 'managers' ? 'block' : 'none';
      
      if (tab === 'invoices') {
        loadInvoices();
      }
      if (tab === 'managers') {
        loadManagers();
      }
    }
    
    async function loadInvoices() {
      try {
        const res = await fetch(`${API_BASE}/invoices?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          allInvoices = data.data;
          renderInvoices(allInvoices);
        } else {
          document.getElementById('invoiceList').innerHTML = `<div class="error-msg">${data.error}</div>`;
        }
      } catch (e) {
        console.error('Invoices error:', e);
        document.getElementById('invoiceList').innerHTML = '<div class="error-msg">Ошибка загрузки</div>';
      }
    }
    
    function renderInvoices(invoices) {
      const list = document.getElementById('invoiceList');
      
      if (invoices.length === 0) {
        list.innerHTML = '<div class="loading">Нет ожидающих оплат</div>';
        return;
      }
      
      list.innerHTML = invoices.map(inv => {
        const isPaid = inv.status === 'paid';
        const userName = inv.first_name || inv.username || 'Пользователь';
        const date = new Date(inv.created_at).toLocaleString('ru-RU');
        
        return `
          <div class="invoice-card ${isPaid ? 'paid' : ''}">
            <div class="invoice-header">
              <span class="invoice-user">👤 ${userName}</span>
              <span class="invoice-amount">${parseFloat(inv.amount).toFixed(2)} ${inv.asset}</span>
            </div>
            <div class="invoice-details">
              ID: ${inv.telegram_id}<br>
              Создан: ${date}<br>
              Invoice: ${inv.invoice_id}
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="invoice-status ${isPaid ? 'status-paid' : 'status-active'}">
                ${isPaid ? '✅ Оплачен' : '⏳ Ожидает'}
              </span>
              ${!isPaid ? `<button class="btn-confirm" onclick="confirmInvoice('${inv.invoice_id}')" style="width: auto; padding: 8px 16px;">✅ Подтвердить</button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    async function confirmInvoice(invoiceId) {
      if (!confirm('Подтвердить оплату? Баланс пользователя будет пополнен.')) return;
      
      try {
        const res = await fetch(`${API_BASE}/invoices/${invoiceId}/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Оплата подтверждена!', 'success');
          loadInvoices();
          loadStats();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка подтверждения', 'error');
      }
    }
    
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('totalUsers').textContent = data.data.totalUsers;
          document.getElementById('totalBalance').textContent = formatMoney(data.data.totalBalance);

    let userHistoryData = [];
    let currentHistoryTab = 'all';
    
    async function loadUserInvoices(telegramId) {
      const container = document.getElementById('userInvoiceHistory');
      container.innerHTML = '<div class="loading" style="font-size: 12px; padding: 10px;">Загрузка...</div>';
      currentHistoryTab = 'all';
      updateHistoryTabs();
      
      try {
        const res = await fetch(`${API_BASE}/user/${telegramId}/history?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          userHistoryData = data.data || [];
          renderHistory();
        } else {
          container.innerHTML = '<div style="font-size: 12px; color: #ff4444; text-align: center; padding: 10px;">Ошибка загрузки</div>';
        }
      } catch (e) {
        container.innerHTML = '<div style="font-size: 12px; color: #ff4444; text-align: center; padding: 10px;">Ошибка загрузки</div>';
      }
    }
    
    function switchHistoryTab(tab) {
      currentHistoryTab = tab;
      updateHistoryTabs();
      renderHistory();
    }
    
    function updateHistoryTabs() {
      document.getElementById('tabAll').classList.toggle('active', currentHistoryTab === 'all');
      document.getElementById('tabDeposits').classList.toggle('active', currentHistoryTab === 'deposit');
      document.getElementById('tabWithdrawals').classList.toggle('active', currentHistoryTab === 'withdrawal');
      document.getElementById('tabTrades').classList.toggle('active', currentHistoryTab === 'trade');
    }
    
    function renderHistory() {
      const container = document.getElementById('userInvoiceHistory');
      
      const filtered = currentHistoryTab === 'all' 
        ? userHistoryData 
        : userHistoryData.filter(item => item.type === currentHistoryTab);
      
      if (filtered.length === 0) {
        const emptyTexts = {
          'all': 'Нет активности',
          'deposit': 'Нет депозитов',
          'withdrawal': 'Нет выводов',
          'trade': 'Нет сделок'
        };
        container.innerHTML = `<div style="font-size: 12px; color: #8892b0; text-align: center; padding: 15px;">${emptyTexts[currentHistoryTab]}</div>`;
        return;
      }
      
      container.innerHTML = filtered.map(item => {
        const date = new Date(item.created_at).toLocaleString('ru-RU');
        
        // Deposit
        if (item.type === 'deposit') {
          const isPaid = item.status === 'paid';
          return `
            <div style="background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 3px solid ${isPaid ? '#00ff88' : '#ffd700'};">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #4db8ff;">💰 ${parseFloat(item.amount).toFixed(2)} ${item.asset}</span>
                <span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: ${isPaid ? 'rgba(0,255,136,0.2)' : 'rgba(255,215,0,0.2)'}; color: ${isPaid ? '#00ff88' : '#ffd700'};">
                  ${isPaid ? '✅ Оплачен' : '⏳ Ожидает'}
                </span>
              </div>
              <div style="font-size: 11px; color: #8892b0; margin-top: 5px;">Депозит • ${date}</div>
              ${!isPaid ? `<button onclick="confirmInvoiceFromModal('${item.id}')" style="width: 100%; margin-top: 8px; padding: 6px; background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%); border: none; border-radius: 6px; color: #000; font-weight: 600; font-size: 12px; cursor: pointer;">✅ Подтвердить</button>` : ''}
            </div>
          `;
        }
        
        // Withdrawal
        if (item.type === 'withdrawal') {
          const statusColors = {
            'pending': { bg: 'rgba(255,215,0,0.2)', color: '#ffd700', text: '⏳ Ожидает' },
            'approved': { bg: 'rgba(0,255,136,0.2)', color: '#00ff88', text: '✅ Одобрен' },
            'rejected': { bg: 'rgba(255,68,68,0.2)', color: '#ff4444', text: '❌ Отклонён' }
          };
          const st = statusColors[item.status] || statusColors['pending'];
          const isPending = item.status === 'pending';
          return `
            <div style="background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #ff9800;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #ff9800;">📤 ${parseFloat(item.amount).toFixed(2)} USDT</span>
                <span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: ${st.bg}; color: ${st.color};">${st.text}</span>
              </div>
              <div style="font-size: 11px; color: #8892b0; margin-top: 5px;">Вывод • ${date}</div>
              <div style="font-size: 10px; color: #666; margin-top: 3px; word-break: break-all;">${item.wallet || ''}</div>
              ${isPending ? `<button onclick="returnWithdrawal('${item.id}')" style="width: 100%; margin-top: 8px; padding: 6px; background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%); border: none; border-radius: 6px; color: #fff; font-weight: 600; font-size: 12px; cursor: pointer;">↩️ Вернуть средства</button>` : ''}
            </div>
          `;
        }
        
        // Trade
        if (item.type === 'trade') {
          const isWin = item.result === 'win';
          const isLoss = item.result === 'loss';
          const isPending = item.status === 'active' || item.status === 'open';
          const dirIcon = item.direction === 'up' ? '📈' : '📉';
          let resultBadge = '';
          if (isPending) {
            resultBadge = `<span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(77,184,255,0.2); color: #4db8ff;">⏳ Открыта</span>`;
          } else if (isWin) {
            resultBadge = `<span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(0,255,136,0.2); color: #00ff88;">✅ Выиграл</span>`;
          } else if (isLoss) {
            resultBadge = `<span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(255,68,68,0.2); color: #ff4444;">❌ Проиграл</span>`;
          } else {
            resultBadge = `<span style="font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(136,146,176,0.2); color: #8892b0;">Закрыта</span>`;
          }
          return `
            <div style="background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #9b59b6;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #9b59b6;">${dirIcon} ${parseFloat(item.amount).toFixed(2)} USDT</span>
                ${resultBadge}
              </div>
              <div style="font-size: 11px; color: #8892b0; margin-top: 5px;">Сделка ${item.asset || 'BTC'} • ${date}</div>
            </div>
          `;
        }
        
        return '';
      }).join('');
    }
    
    async function confirmInvoiceFromModal(invoiceId) {
      if (!confirm('Подтвердить оплату?')) return;
      
      try {
        const res = await fetch(`${API_BASE}/invoices/${invoiceId}/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Оплата подтверждена!', 'success');
          if (currentUser) {
            loadUserInvoices(currentUser.telegram_id);
            // Refresh user data
            const userRes = await fetch(`${API_BASE}/user/${currentUser.telegram_id}?adminId=${adminId}`);
            const userData = await userRes.json();
            if (userData.success) {
              currentUser = userData.data;
              document.getElementById('newBalance').value = parseFloat(currentUser.balance_usdt).toFixed(2);
            }
          }
          loadStats();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка', 'error');
      }
    }

      try {

          method: 'POST',
          headers: { 'Content-Type': 'application/json' },

              currentUser = userData.data;
              document.getElementById('newBalance').value = parseFloat(currentUser.balance_usdt).toFixed(2);

        } else {
          showToast('❌ ' + data.error, 'error');

    function closeModal() {
      document.getElementById('userModal').classList.remove('active');
      currentUser = null;

      window.location.href = `chat.html?user=${currentUser.telegram_id}`;
    }
    
    function setMode(mode) {
      selectedMode = mode;
      updateModeButtons();

    function updateModeButtons() {
      document.getElementById('btnWin').classList.toggle('active', selectedMode === 'win');
      document.getElementById('btnLoss').classList.toggle('active', selectedMode === 'loss');
    }
    
    function setTradingBlocked(blocked) {
      selectedTradingBlocked = blocked;
      updateTradingBlockedButtons();
    }
    
    function updateTradingBlockedButtons() {
      const btnAllowed = document.getElementById('btnTradingAllowed');
      const btnBlocked = document.getElementById('btnTradingBlocked');
      
      if (selectedTradingBlocked) {
        btnAllowed.style.opacity = '0.4';
        btnBlocked.style.opacity = '1';
        btnBlocked.style.boxShadow = '0 0 10px rgba(255,68,68,0.5)';
        btnAllowed.style.boxShadow = 'none';
      } else {
        btnAllowed.style.opacity = '1';
        btnBlocked.style.opacity = '0.4';
        btnAllowed.style.boxShadow = '0 0 10px rgba(0,255,136,0.5)';
        btnBlocked.style.boxShadow = 'none';
      }
    }
    
    function setVerification(state) {
      selectedVerification = state;
      updateVerificationButtons();
    }
    
    function updateVerificationButtons() {
      const btnOff = document.getElementById('btnVerifOff');
      const btnRequired = document.getElementById('btnVerifRequired');
      const btnDone = document.getElementById('btnVerifDone');
      
      [btnOff, btnRequired, btnDone].forEach(btn => {
        btn.style.opacity = '0.4';
        btn.style.boxShadow = 'none';
      });
      
      if (selectedVerification === 'off') {
        btnOff.style.opacity = '1';
        btnOff.style.boxShadow = '0 0 10px rgba(102,102,102,0.5)';
      } else if (selectedVerification === 'required') {
        btnRequired.style.opacity = '1';
        btnRequired.style.boxShadow = '0 0 10px rgba(255,193,7,0.5)';
      } else if (selectedVerification === 'done') {
        btnDone.style.opacity = '1';
        btnDone.style.boxShadow = '0 0 10px rgba(0,255,136,0.5)';
      }
    }
    
    async function saveUserChanges() {
      if (!currentUser) return;
      
      const newBalance = parseFloat(document.getElementById('newBalance').value);
      
      // Determine verification values
      const needsVerification = selectedVerification !== 'off';
      const verified = selectedVerification === 'done';
      
      try {
        const res = await fetch(`${API_BASE}/user/${currentUser.telegram_id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            adminId,
            balance_usdt: newBalance,
            trade_mode: selectedMode,
            trading_blocked: selectedTradingBlocked,
            needs_verification: needsVerification,
            verified: verified
          })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Изменения сохранены', 'success');
          // Update currentUser with new values
          currentUser.balance_usdt = newBalance;
          currentUser.trade_mode = selectedMode;
          currentUser.trading_blocked = selectedTradingBlocked;
          currentUser.needs_verification = needsVerification;
          currentUser.verified = verified;
          loadUsers();
          loadStats();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка сохранения', 'error');
      }
    }
    
    async function toggleBlockUser() {
      if (!currentUser) return;
      
      const name = currentUser.first_name || currentUser.username || 'пользователя';
      const isBlocked = currentUser.is_blocked;
      const action = isBlocked ? 'разблокировать' : 'заблокировать';
      
      if (!confirm(`⚠️ Вы уверены, что хотите ${action} ${name}?`)) {
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/user/${currentUser.telegram_id}/block?adminId=${adminId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ blocked: !isBlocked })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ ' + data.message, 'success');
          // Update current user state
          currentUser.is_blocked = !isBlocked;
          // Refresh modal
          openUser(currentUser.telegram_id);
          loadUsers();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка', 'error');
      }
    }
    
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function formatMoney(amount) {
      return parseFloat(amount || 0).toFixed(2);

      return new Date(dateStr).toLocaleDateString('ru-RU');
    }

    async function addManager() {
      const telegramId = document.getElementById('managerTelegramId').value.trim();
      const name = document.getElementById('managerName').value.trim();
      
      if (!telegramId) {
        showToast('❌ Введите Telegram ID', 'error');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/managers`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId, telegram_id: telegramId, name })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Менеджер добавлен', 'success');
          document.getElementById('managerTelegramId').value = '';
          document.getElementById('managerName').value = '';
          loadManagers();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка добавления', 'error');
      }
    }
    
    async function deleteManager(managerId) {
      if (!confirm('Удалить менеджера? Пользователи будут отвязаны.')) return;
      
      try {
        const res = await fetch(`${API_BASE}/managers/${managerId}?adminId=${adminId}`, {
          method: 'DELETE'
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Менеджер удалён', 'success');
          loadManagers();
        } else {
          showToast('❌ ' + data.error, 'error');
        }
      } catch (e) {
        showToast('❌ Ошибка удаления', 'error');
      }
    }
  </script>
</body>
</html>
