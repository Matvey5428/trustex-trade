    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/i18n.js" defer></script>
    <script src="js/keyboard-nav.js" defer></script>
    <script src="js/auth.js?v=2" defer></script>
    <script src="js/api.js" defer></script>

    <script>(function() { var lang = localStorage.getItem('nexo_lang') || 'ru'; document.documentElement.lang = lang; })();</script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --bg-elevated: #262c36;
            --accent: #00d4aa;
            --accent-hover: #00f5c4;
            --green: #3fb950;
            --green-light: rgba(63, 185, 80, 0.1);
            --red: #f85149;
            --red-light: rgba(248, 81, 73, 0.1);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .wallet-container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .wallet-header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 16px 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-card);
            border: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Balance Section */
        .balance-section {
            text-align: left;
        }

        .balance-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .eye-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
        }

        .eye-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .total-balance {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .balance-change {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .balance-change.positive { color: var(--green); }
        .balance-change.negative { color: var(--red); }

        .balance-usd {
            color: var(--text-secondary);
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 12px;
            padding: 20px 16px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--accent);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn.deposit .action-icon {
            background: var(--green-light);
            color: var(--green);
        }

        .action-btn.withdraw .action-icon {
            background: var(--red-light);
            color: var(--red);
        }

        .action-btn.trade .action-icon {
            background: rgba(240, 185, 11, 0.1);
            color: var(--accent);
        }

        .action-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .action-text {
            font-size: 13px;
            font-weight: 500;
        }

        /* Assets Section */
        .section {
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
        }

        .section-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
        }

        .asset-list {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .asset-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .asset-item:last-child {
            border-bottom: none;
        }

        .asset-item:hover {
            background: var(--bg-elevated);
        }

        .asset-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .asset-icon.usdt { background: #26a17b; color: white; }
        .asset-icon.btc { background: #f7931a; color: white; }
        .asset-icon.eth { background: #627eea; color: white; }
        .asset-icon.ton { background: #0088cc; color: white; }

        .asset-info {
            flex: 1;
            min-width: 0;
        }

        .asset-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .asset-fullname {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .asset-balance {
            text-align: right;
        }

        .asset-amount {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .asset-value {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Quick Info */
        .quick-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .info-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
        }

        .info-value.green { color: var(--green); }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-top: 1px solid rgba(48, 54, 61, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 0 max(16px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 70px;
        }
        
        /* Hide nav when input is focused (keyboard open) */
        body.input-focused .bottom-nav {
            display: none !important;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #6e7681;
            padding: 8px 0;
            border-radius: 12px;
            transition: color 0.15s ease;
            width: 20%;
            height: 46px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item:hover { color: #8b949e; }
        .nav-item.active { color: var(--accent); }

        .nav-item::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .nav-item.active::before {
            opacity: 1;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-balance {
            width: 180px;
            height: 32px;
            margin-bottom: 8px;
        }

        .skeleton-text {
            width: 100px;
            height: 16px;
        }
    </style>
</head>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    // Balance toggle and wallet logic
    let balanceHidden = false;
    let userData = null;
    let prices = { btc: 0, eth: 0, ton: 0 };

    // Toggle balance visibility
    document.getElementById('toggleBalance').addEventListener('click', () => {
        balanceHidden = !balanceHidden;
        updateBalanceDisplay();
    });

    function formatNumber(num, decimals = 2) {
        return parseFloat(num || 0).toLocaleString('ru-RU', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        }).replace(/,/g, '.');
    }

    function hideValue(value) {
        return '••••••';
    }

    function updateBalanceDisplay() {
        if (!userData) return;
        
        const b = (f) => parseFloat(userData['balance_' + f] ?? userData[f]) || 0;
        const usdt = b('usdt');
        const btc = b('btc');
        const eth = b('eth');
        const ton = b('ton');
        const rub = b('rub');
        const eur = b('eur');

        const btcValue = btc * prices.btc;
        const ethValue = eth * prices.eth;
        const tonValue = ton * prices.ton;
        const rubValue = typeof BalanceManager !== 'undefined' ? BalanceManager.rubToUsd(rub) : 0;
        const eurValue = typeof BalanceManager !== 'undefined' ? BalanceManager.eurToUsd(eur) : 0;
        const totalUsd = usdt + btcValue + ethValue + tonValue + rubValue + eurValue;

        // Update total balance
        document.getElementById('totalBalance').innerHTML = balanceHidden 
            ? hideValue() 
            : `$${formatNumber(totalUsd)}`;

        document.getElementById('balanceChange').innerHTML = balanceHidden 
            ? '' 
            : `<span class="balance-usd">≈ ${formatNumber(totalUsd)} USDT</span>`;

        // Update available balance
        document.getElementById('availableBalance').textContent = balanceHidden 
            ? hideValue() 
            : `$${formatNumber(usdt)}`;

        // Update asset balances
        document.getElementById('usdtBalance').textContent = balanceHidden 
            ? hideValue() 
            : formatNumber(usdt);
        document.getElementById('usdtValue').textContent = balanceHidden 
            ? '' 
            : `≈ $${formatNumber(usdt)}`;

        document.getElementById('btcBalance').textContent = balanceHidden 
            ? hideValue() 
            : formatNumber(btc, 8);
        document.getElementById('btcValue').textContent = balanceHidden 
            ? '' 
            : `≈ $${formatNumber(btcValue)}`;

        document.getElementById('ethBalance').textContent = balanceHidden 
            ? hideValue() 
            : formatNumber(eth, 8);
        document.getElementById('ethValue').textContent = balanceHidden 
            ? '' 
            : `≈ $${formatNumber(ethValue)}`;

        document.getElementById('tonBalance').textContent = balanceHidden 
            ? hideValue() 
            : formatNumber(ton, 4);
        document.getElementById('tonValue').textContent = balanceHidden 
            ? '' 
            : `≈ $${formatNumber(tonValue)}`;

        // Update eye icon
        document.getElementById('eyeIcon').innerHTML = balanceHidden 
            ? '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>'
            : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }

    async function loadPrices() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT","TONUSDT"]');
            const data = await res.json();
            data.forEach(item => {
                if (item.symbol === 'BTCUSDT') prices.btc = parseFloat(item.price);
                if (item.symbol === 'ETHUSDT') prices.eth = parseFloat(item.price);
                if (item.symbol === 'TONUSDT') prices.ton = parseFloat(item.price);
            });
        } catch (e) {
            /* silent */
        }
    }

    async function loadData() {
        const telegramId = tg?.initDataUnsafe?.user?.id || localStorage.getItem('nexo_guest_telegram_id');
        if (!telegramId) return;
        
        try {
            // Load prices and user data in parallel
            const [pricesRes, userRes, tradesRes] = await Promise.all([
                fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT","TONUSDT"]'),
                fetch(`/api/profile/${telegramId}`),
                fetch(`/api/trades/history/${telegramId}?limit=100`)
            ]);
            
            // Process prices
            if (pricesRes.ok) {
                const data = await pricesRes.json();
                data.forEach(item => {
                    if (item.symbol === 'BTCUSDT') prices.btc = parseFloat(item.price);
                    if (item.symbol === 'ETHUSDT') prices.eth = parseFloat(item.price);
                    if (item.symbol === 'TONUSDT') prices.ton = parseFloat(item.price);
                });
            }
            
            // Process user data
            if (userRes.ok) {
                const data = await userRes.json();
                userData = data.data;
                updateBalanceDisplay();
            }

            // Process active trades count
            if (tradesRes.ok) {
                const tradesData = await tradesRes.json();
                const activeTrades = (tradesData.data || []).filter(t => t.status === 'active').length;
                document.getElementById('activeTrades').textContent = activeTrades;
            }
        } catch (e) {
            document.getElementById('totalBalance').textContent = '$0.00';
            document.getElementById('balanceChange').innerHTML = '';
        }
    }

    loadData();
    // Refresh every 10 seconds
    setInterval(loadData, 10000);
</script>
</body>
</html>
