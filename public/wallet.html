<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кошелек - TrustEx</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/auth.js?v=2" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/balance.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <style>body { opacity: 0; } body.i18n-ready { opacity: 1; transition: opacity 0.15s ease-out; }</style>
    <script>(function() { var lang = localStorage.getItem('nexo_lang') || 'ru'; document.documentElement.lang = lang; setTimeout(function() { document.body && document.body.classList.add('i18n-ready'); }, 500); })();</script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --bg-hover: #262c36;
            --accent: #00d4aa;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border: #30363d;
            --success: #3fb950;
            --danger: #f85149;
        }

        * { box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0 0 100px 0;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 28px 20px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .action-btn.deposit {
            background: linear-gradient(135deg, rgba(63, 185, 80, 0.15) 0%, rgba(63, 185, 80, 0.05) 100%);
            border-color: rgba(63, 185, 80, 0.3);
        }

        .action-btn.deposit:hover {
            background: linear-gradient(135deg, rgba(63, 185, 80, 0.25) 0%, rgba(63, 185, 80, 0.1) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(63, 185, 80, 0.2);
        }

        .action-btn.withdraw {
            background: linear-gradient(135deg, rgba(248, 81, 73, 0.15) 0%, rgba(248, 81, 73, 0.05) 100%);
            border-color: rgba(248, 81, 73, 0.3);
        }

        .action-btn.withdraw:hover {
            background: linear-gradient(135deg, rgba(248, 81, 73, 0.25) 0%, rgba(248, 81, 73, 0.1) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(248, 81, 73, 0.2);
        }

        .action-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn.deposit .action-icon {
            background: linear-gradient(135deg, #3fb950 0%, #2ea043 100%);
        }

        .action-btn.withdraw .action-icon {
            background: linear-gradient(135deg, #f85149 0%, #da3633 100%);
        }

        .action-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .action-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .action-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-list li:last-child {
            border-bottom: none;
        }

        .info-list li svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
            flex-shrink: 0;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 10px;
            transition: color 0.2s;
            position: relative;
            padding: 4px 16px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .nav-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .nav-label {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <a href="index.html" class="back-btn">← Назад</a>
        <h1 class="page-title">💳 Кошелек</h1>
    </div>

    <div class="balance-card">
        <div class="balance-label">Доступный баланс</div>
        <div class="balance-amount" id="balanceDisplay">0.00 USDT</div>
    </div>

    <div class="action-buttons">
        <a href="deposit.html" class="action-btn deposit">
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
            <span class="action-label">Пополнить</span>
            <span class="action-desc">Через криптовалюту</span>
        </a>
        <a href="withdraw.html" class="action-btn withdraw">
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </div>
            <span class="action-label">Вывести</span>
            <span class="action-desc">На ваш кошелек</span>
        </a>
    </div>

    <div class="info-card">
        <div class="info-title">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--accent)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            Информация
        </div>
        <ul class="info-list">
            <li>
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Мгновенное зачисление депозитов
            </li>
            <li>
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Вывод обрабатывается до 24 часов
            </li>
            <li>
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Комиссия сети оплачивается отдельно
            </li>
        </ul>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></span>
        <span class="nav-label">Активы</span>
    </a>
    <a href="trading.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg></span>
        <span class="nav-label">Рынки</span>
    </a>
    <a href="exchange.html" class="nav-item">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg></span>
        <span class="nav-label">Обмен</span>
    </a>
    <a href="wallet.html" class="nav-item active">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></span>
        <span class="nav-label">Кошелек</span>
    </a>
</nav>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    async function loadBalance() {
        const telegramId = tg?.initDataUnsafe?.user?.id || localStorage.getItem('nexo_guest_telegram_id');
        if (!telegramId) return;
        
        try {
            const res = await fetch(`/api/profile/${telegramId}`);
            if (res.ok) {
                const data = await res.json();
                const usdt = parseFloat(data.data?.usdt || 0);
                document.getElementById('balanceDisplay').textContent = `${usdt.toLocaleString(undefined, {minimumFractionDigits: 2})} USDT`;
            }
        } catch (e) {
            console.error('Balance load error:', e);
        }
    }

    loadBalance();
</script>
</body>
</html>
