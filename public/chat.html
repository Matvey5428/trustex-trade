<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TrustEx Chat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      font-weight: 600;
      font-size: 16px;
    }
    
    .user-status {
      font-size: 12px;
      color: #8892b0;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    
    .message.admin {
      align-self: flex-end;
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    
    .message.user {
      align-self: flex-start;
      background: #1a2332;
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    
    .message.admin .message-time {
      text-align: right;
    }
    
    .input-container {
      background: #1a1f35;
      padding: 12px 15px;
      display: flex;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .message-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 10px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    
    .message-input::placeholder {
      color: #8892b0;
    }
    
    .message-input:focus {
      border-color: #4db8ff;
    }
    
    .send-btn {
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .send-btn:disabled {
      opacity: 0.5;
    }
    
    .template-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .template-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    /* Modal styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: #1a2332;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .modal-header {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: #8892b0;
      font-size: 24px;
      cursor: pointer;
    }
    
    .modal-body {
      padding: 15px;
      overflow-y: auto;
      flex: 1;
    }
    
    .template-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .template-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    
    .template-item:hover {
      background: rgba(77, 184, 255, 0.2);
    }
    
    .template-content {
      flex: 1;
      min-width: 0;
    }
    
    .template-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .template-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
    
    .template-badge.global {
      background: rgba(77, 184, 255, 0.2);
      color: #4db8ff;
    }
    
    .template-badge.personal {
      background: rgba(255, 179, 71, 0.2);
      color: #ffb347;
    }
    
    .template-preview {
      font-size: 12px;
      color: #8892b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .template-delete {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
    }
    
    .template-empty {
      text-align: center;
      color: #8892b0;
      padding: 30px;
    }
    
    .add-template-form {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-label {
      display: block;
      font-size: 12px;
      color: #8892b0;
      margin-bottom: 6px;
    }
    
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    
    .form-input:focus {
      border-color: #4db8ff;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .add-template-btn {
      width: 100%;
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .add-template-btn:disabled {
      opacity: 0.5;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8892b0;
      text-align: center;
      padding: 20px;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #8892b0;
    }
    
    .date-divider {
      text-align: center;
      color: #8892b0;
      font-size: 12px;
      margin: 15px 0;
      position: relative;
    }
    
    .date-divider::before,
    .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    
    .date-divider::before {
      left: 0;
    }
    
    .date-divider::after {
      right: 0;
    }
    
    /* Message edit styles */
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      position: relative;
    }
    
    .message-wrapper.admin {
      align-self: flex-end;
    }
    
    .message-wrapper.user {
      align-self: flex-start;
    }
    
    .message-actions {
      display: none;
      position: absolute;
      top: -8px;
      right: -8px;
      gap: 4px;
    }
    
    .message-wrapper.admin:hover .message-actions {
      display: flex;
    }
    
    .edit-btn {
      background: rgba(77, 184, 255, 0.9);
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .edit-btn:hover {
      background: #2ea3e8;
    }
    
    .edited-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-style: italic;
    }
    
    /* Edit modal */
    .edit-modal-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .edit-textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      resize: vertical;
      outline: none;
    }
    
    .edit-textarea:focus {
      border-color: #4db8ff;
    }
    
    .edit-buttons {
      display: flex;
      gap: 10px;
    }
    
    .cancel-edit-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    
    .save-edit-btn {
      flex: 1;
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .save-edit-btn:disabled {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="user-info">
      <div class="user-name" id="userName">Загрузка...</div>
      <div class="user-status" id="userStatus">ID: -</div>
    </div>
  </div>
  
  <div class="messages-container" id="messagesContainer">
    <div class="loading">Загрузка сообщений...</div>
  </div>
  
  <div class="input-container">
    <button class="template-btn" onclick="openTemplates()" title="Шаблоны">📋</button>
    <input type="text" class="message-input" id="messageInput" placeholder="Написать сообщение..." autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  
  <!-- Templates Modal -->
  <div class="modal-overlay" id="templatesModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">📋 Шаблоны</div>
        <button class="modal-close" onclick="closeTemplates()">×</button>
      </div>
      <div class="modal-body">
        <div class="template-list" id="templateList">
          <div class="template-empty">Загрузка...</div>
        </div>
        
        <div class="add-template-form">
          <div class="form-group">
            <label class="form-label">Название шаблона</label>
            <input type="text" class="form-input" id="newTemplateTitle" placeholder="Например: Приветствие">
          </div>
          <div class="form-group">
            <label class="form-label">Текст сообщения</label>
            <textarea class="form-input form-textarea" id="newTemplateMessage" placeholder="Текст шаблона..."></textarea>
          </div>
          <button class="add-template-btn" onclick="addTemplate()">+ Добавить шаблон</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Edit Message Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">✏️ Редактировать сообщение</div>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="edit-modal-content">
          <textarea class="edit-textarea" id="editMessageText" placeholder="Текст сообщения..."></textarea>
          <div class="edit-buttons">
            <button class="cancel-edit-btn" onclick="closeEditModal()">Отмена</button>
            <button class="save-edit-btn" id="saveEditBtn" onclick="saveEditedMessage()">Сохранить</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = window.location.origin + '/api/admin';
    const tg = window.Telegram?.WebApp;
    
    let adminId = null;
    let targetUserId = null;
    let refreshInterval = null;
    let chatMessages = [];
    
    // Get adminId from Telegram or localStorage fallback
    if (tg) {
      tg.ready();
      tg.expand();
      adminId = tg.initDataUnsafe?.user?.id;
      if (adminId) {
        localStorage.setItem('trustex_admin_id', String(adminId));
      }
    }
    
    // Fallback to localStorage if not available from Telegram
    if (!adminId) {
      adminId = localStorage.getItem('trustex_admin_id');
    }
    
    // Get target user from URL params
    const urlParams = new URLSearchParams(window.location.search);
    targetUserId = urlParams.get('user');
    
    if (!targetUserId) {
      document.getElementById('messagesContainer').innerHTML = 
        '<div class="empty-state">Пользователь не выбран</div>';
    } else {
      loadChat();
      // Auto-refresh every 3 seconds
      refreshInterval = setInterval(loadChat, 3000);
    }
    
    // Send on Enter
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // =============================================
    // KEYBOARD DISMISS ON TAP/SCROLL UP
    // =============================================
    const messageInput = document.getElementById('messageInput');
    const messagesContainer = document.getElementById('messagesContainer');
    
    // Scroll to bottom when focused
    messageInput.addEventListener('focus', () => {
      setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100);
    });
    
    // Tap or scroll UP dismisses keyboard, scroll DOWN keeps it
    let touchStartY = 0;
    let isTap = true;
    let hasDismissed = false;
    
    messagesContainer.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      isTap = true;
      hasDismissed = false;
    }, { passive: true });
    
    messagesContainer.addEventListener('touchmove', (e) => {
      const currentY = e.touches[0].clientY;
      const moveDistance = currentY - touchStartY;
      
      if (Math.abs(moveDistance) > 10) {
        isTap = false; // It's a scroll, not a tap
        
        // Scroll UP (finger moves DOWN on screen) = dismiss keyboard instantly
        if (moveDistance > 50 && !hasDismissed && document.activeElement === messageInput) {
          hasDismissed = true;
          messageInput.blur();
        }
      }
    }, { passive: true });
    
    messagesContainer.addEventListener('touchend', (e) => {
      if (isTap && (e.target === messagesContainer || e.target.closest('.message'))) {
        messageInput.blur();
      }
    }, { passive: true });

    async function loadChat() {
      try {
        const res = await fetch(`${API_BASE}/chat/${targetUserId}?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('userName').textContent = data.data.user.name;
          document.getElementById('userStatus').textContent = `ID: ${data.data.user.telegram_id}`;
          chatMessages = data.data.messages;
          renderMessages(chatMessages);
        } else {
          document.getElementById('messagesContainer').innerHTML = 
            `<div class="empty-state">${data.error}</div>`;
        }
      } catch (e) {
        /* silent */
      }
    }
    
    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state">Начните диалог с пользователем</div>';
        return;
      }
      
      let html = '';
      let lastDate = null;
      
      messages.forEach(msg => {
        const date = new Date(msg.created_at);
        const dateStr = date.toLocaleDateString('ru-RU');
        
        // Date divider
        if (dateStr !== lastDate) {
          html += `<div class="date-divider">${dateStr}</div>`;
          lastDate = dateStr;
        }
        
        const time = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const senderClass = msg.sender === 'admin' ? 'admin' : 'user';
        
        if (msg.sender === 'admin') {
          // Admin messages with edit button
          html += `
            <div class="message-wrapper admin">
              <div class="message-actions">
                <button class="edit-btn" onclick="openEditModal('${msg.id}', \`${escapeHtml(msg.message).replace(/`/g, '\\`')}\`)" title="Редактировать">✏️</button>
              </div>
              <div class="message admin">
                ${escapeHtml(msg.message)}
                <div class="message-time">${time}</div>
              </div>
            </div>
          `;
        } else {
          // User messages (no edit)
          html += `
            <div class="message-wrapper user">
              <div class="message user">
                ${escapeHtml(msg.message)}
                <div class="message-time">${time}</div>
              </div>
            </div>
          `;
        }
      });
      
      const wasScrolledToBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
      container.innerHTML = html;
      
      // Auto-scroll if was at bottom
      if (wasScrolledToBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      // Очищаем поле сразу
      input.value = '';
      input.focus();
      
      // Оптимистичное обновление - сразу показываем сообщение
      const tempId = 'temp_' + Date.now();
      const tempMessage = {
        id: tempId,
        message: message,
        sender: 'admin',
        created_at: new Date().toISOString()
      };
      chatMessages.push(tempMessage);
      renderMessages(chatMessages);
      
      // Отправляем в фоне
      try {
        const res = await fetch(`${API_BASE}/chat/${targetUserId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId, message })
        });
        
        const data = await res.json();
        
        if (!data.success) {
          chatMessages = chatMessages.filter(m => m.id !== tempId);
          renderMessages(chatMessages);
          showNotification('Ошибка отправки', 'error');
        } else if (!data.telegram_sent) {
          // Сообщение сохранено, но не доставлено в Telegram
          showNotification('⚠️ Пользователь заблокировал бота', 'warning');
        }
      } catch (e) {
        chatMessages = chatMessages.filter(m => m.id !== tempId);
        renderMessages(chatMessages);
        showNotification('Ошибка сети', 'error');
      }
    }
    
    function showNotification(text, type = 'info') {
      const bgColor = type === 'error' ? '#ff4444' : type === 'warning' ? '#ff9800' : '#4CAF50';
      const n = document.createElement('div');
      n.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(0);padding:12px 24px;border-radius:12px;color:#fff;font-size:14px;z-index:9999;background:${bgColor};transition:transform 0.2s ease-out,opacity 0.2s ease-out;touch-action:none;`;
      n.textContent = text;
      document.body.appendChild(n);
      
      let startY = 0, currentY = 0, isDragging = false;
      n.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); startY = e.touches[0].clientY; isDragging = true; n.style.transition = 'none'; }, {passive: false});
      n.addEventListener('touchmove', e => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDragging) return;
        currentY = e.touches[0].clientY - startY;
        if (currentY < 0) {
          n.style.transform = `translateX(-50%) translateY(${currentY}px)`;
          n.style.opacity = Math.max(0, 1 - Math.abs(currentY) / 100);
        }
      }, {passive: false});
      n.addEventListener('touchend', () => {
        isDragging = false;
        n.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
        if (currentY < -50) {
          n.style.transform = 'translateX(-50%) translateY(-120px)';
          n.style.opacity = '0';
          setTimeout(() => n.remove(), 250);
        } else {
          n.style.transform = 'translateX(-50%) translateY(0)';
          n.style.opacity = '1';
        }
        currentY = 0;
      });
      
      const timeout = setTimeout(() => {
        n.style.transform = 'translateX(-50%) translateY(-120px)';
        n.style.opacity = '0';
        setTimeout(() => n.remove(), 250);
      }, 3000);
      n.addEventListener('touchstart', () => clearTimeout(timeout), {once: true});
    }
    
    function goBack() {
      if (refreshInterval) clearInterval(refreshInterval);
      window.location.href = targetUserId ? `admin.html?user=${targetUserId}` : 'admin.html';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // =============================================
    // TEMPLATES FUNCTIONALITY
    // =============================================
    
    let templates = [];
    let isMainAdminUser = false;
    
    function openTemplates() {
      document.getElementById('templatesModal').classList.add('active');
      loadTemplates();
    }
    
    function closeTemplates() {
      document.getElementById('templatesModal').classList.remove('active');
    }
    
    async function loadTemplates() {
      try {
        const res = await fetch(`${API_BASE}/templates?adminId=${adminId}`);
        const data = await res.json();
        
        if (data.success) {
          templates = data.data;
          isMainAdminUser = data.isMainAdmin || false;
          renderTemplates();
        }
      } catch (e) {
        /* silent */
      }
    }
    
    function renderTemplates() {
      const container = document.getElementById('templateList');
      
      if (templates.length === 0) {
        container.innerHTML = '<div class="template-empty">Нет сохранённых шаблонов</div>';
        return;
      }
      
      container.innerHTML = templates.map(t => {
        const isGlobal = t.is_global;
        const canDelete = isMainAdminUser || !isGlobal;
        const badge = isGlobal 
          ? '<span class="template-badge global">общий</span>' 
          : '<span class="template-badge personal">личный</span>';
        
        return `
          <div class="template-item" onclick="useTemplate('${t.id}')">
            <div class="template-content">
              <div class="template-title">${escapeHtml(t.title)} ${badge}</div>
              <div class="template-preview">${escapeHtml(t.message.substring(0, 50))}${t.message.length > 50 ? '...' : ''}</div>
            </div>
            ${canDelete ? `<button class="template-delete" onclick="event.stopPropagation(); deleteTemplate('${t.id}')" title="Удалить">🗑</button>` : ''}
          </div>
        `;
      }).join('');
    }
    
    function useTemplate(templateId) {
      const template = templates.find(t => t.id === templateId);
      if (template) {
        document.getElementById('messageInput').value = template.message;
        closeTemplates();
        document.getElementById('messageInput').focus();
      }
    }
    
    async function addTemplate() {
      const titleInput = document.getElementById('newTemplateTitle');
      const messageInput = document.getElementById('newTemplateMessage');
      const title = titleInput.value.trim();
      const message = messageInput.value.trim();
      
      if (!title || !message) {
        showNotification('Заполните название и текст шаблона', 'error');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/templates`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId, title, message })
        });
        
        const data = await res.json();
        
        if (data.success) {
          titleInput.value = '';
          messageInput.value = '';
          loadTemplates();
        } else {
          showNotification('Ошибка: ' + data.error, 'error');
        }
      } catch (e) {
        showNotification('Ошибка сохранения', 'error');
      }
    }
    
    async function deleteTemplate(templateId) {
      if (!confirm('Удалить этот шаблон?')) return;
      
      try {
        const res = await fetch(`${API_BASE}/templates/${templateId}?adminId=${adminId}`, {
          method: 'DELETE'
        });
        
        const data = await res.json();
        
        if (data.success) {
          loadTemplates();
        } else {
          showNotification(data.error || 'Ошибка удаления', 'error');
        }
      } catch (e) {
        showNotification('Ошибка удаления', 'error');
      }
    }
    
    // Close modal on overlay click
    document.getElementById('templatesModal').addEventListener('click', (e) => {
      if (e.target.id === 'templatesModal') {
        closeTemplates();
      }
    });
    
    // =============================================
    // MESSAGE EDITING FUNCTIONS
    // =============================================
    let editingMessageId = null;
    
    function openEditModal(messageId, currentText) {
      editingMessageId = messageId;
      document.getElementById('editMessageText').value = currentText;
      document.getElementById('editModal').classList.add('active');
      document.getElementById('editMessageText').focus();
    }
    
    function closeEditModal() {
      editingMessageId = null;
      document.getElementById('editModal').classList.remove('active');
      document.getElementById('editMessageText').value = '';
    }
    
    async function saveEditedMessage() {
      const newText = document.getElementById('editMessageText').value.trim();
      
      if (!newText || !editingMessageId) return;
      
      const saveBtn = document.getElementById('saveEditBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Сохранение...';
      
      try {
        const res = await fetch(`${API_BASE}/chat/message/${editingMessageId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: newText, adminId })
        });
        
        const data = await res.json();
        
        if (data.success) {
          // Update local message
          const msgIndex = chatMessages.findIndex(m => m.id === editingMessageId);
          if (msgIndex !== -1) {
            chatMessages[msgIndex].message = newText;
            chatMessages[msgIndex].edited_at = new Date().toISOString();
          }
          renderMessages(chatMessages);
          closeEditModal();
          showNotification('Сообщение изменено', 'success');
        } else {
          showNotification(data.error || 'Ошибка редактирования', 'error');
        }
      } catch (e) {
        showNotification('Ошибка сети', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Сохранить';
      }
    }
    
    // Close edit modal on overlay click
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') {
        closeEditModal();
      }
    });
    
    // Save on Ctrl+Enter in edit modal
    document.getElementById('editMessageText').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        saveEditedMessage();
      }
    });
    
    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      if (refreshInterval) clearInterval(refreshInterval);
    });
  </script>
</body>
</html>
