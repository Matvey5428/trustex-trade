<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Поддержка — TrustEx</title>
  <link rel="preconnect" href="https://trustex-trade.onrender.com">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="js/auth.js"></script>
  <style>body { opacity: 1; }</style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e17;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(180deg, #1a2332 0%, #0a0e17 100%);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      z-index: 100;
    }
    
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .header-subtitle {
      font-size: 12px;
      color: #00ff88;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
    }
    
    .message.user {
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }
    
    .message.admin {
      background: rgba(255,255,255,0.1);
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }
    
    .message-time {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
      text-align: right;
    }
    
    .message.admin .message-time {
      text-align: left;
    }
    
    .edited-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-style: italic;
      margin-right: 4px;
    }
    
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8892b0;
      text-align: center;
      padding: 40px;
    }
    
    .empty-chat-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    
    .empty-chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 10px;
    }
    
    .empty-chat-text {
      font-size: 14px;
      line-height: 1.5;
    }
    
    .input-container {
      background: #1a2332;
      padding: 12px 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    
    .message-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 12px 20px;
      color: #fff;
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 100px;
    }
    
    .message-input::placeholder {
      color: #8892b0;
    }
    
    .message-input:focus {
      border-color: #4db8ff;
    }
    
    .send-btn {
      background: linear-gradient(135deg, #4db8ff 0%, #2ea3e8 100%);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #8892b0;
    }
    
    .typing-indicator {
      display: none;
      padding: 10px 15px;
      color: #8892b0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div>
      <div class="header-title">💬 Поддержка</div>
      <div class="header-subtitle">Онлайн</div>
    </div>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="loading">Загрузка...</div>
  </div>
  
  <div class="typing-indicator" id="typingIndicator">
    Поддержка печатает...
  </div>
  
  <div class="input-container">
    <textarea 
      class="message-input" 
      id="messageInput" 
      placeholder="Напишите сообщение..."
      rows="1"
      onkeydown="handleKeyDown(event)"
    ></textarea>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
  
  <script>
    const tg = window.Telegram?.WebApp;
    let userId = null;
    let messages = [];
    
    if (tg) {
      tg.ready();
      tg.expand();
    }
    
    // Get userId from TelegramAuth (same as index.html)
    function getUserId() {
      // Try from TelegramAuth first
      const user = TelegramAuth?.getCurrentUser();
      if (user?.telegram_id) return user.telegram_id;
      
      // Try saved user data
      const savedUser = localStorage.getItem('nexo_user_data');
      if (savedUser) {
        try {
          const parsed = JSON.parse(savedUser);
          if (parsed?.telegram_id) return parsed.telegram_id;
        } catch(e) {}
      }
      
      // Try direct Telegram ID
      const telegramId = TelegramAuth?.getTelegramId();
      if (telegramId) return telegramId;
      
      // Fallback to saved telegram ID
      const savedId = localStorage.getItem('trustex_user_telegram_id');
      if (savedId) return parseInt(savedId);
      
      // Last resort - guest ID
      const guestId = localStorage.getItem('nexo_guest_telegram_id');
      if (guestId) return parseInt(guestId);
      
      return null;
    }
    
    function goBack() {
      if (tg?.BackButton) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    }
    
    async function loadMessages() {
      if (!userId) {
        document.getElementById('chatContainer').innerHTML = 
          '<div class="empty-chat"><div class="empty-chat-icon">⚠️</div><div class="empty-chat-title">Ошибка</div><div class="empty-chat-text">Откройте приложение через Telegram</div></div>';
        return;
      }
      
      try {
        const res = await fetch(`/api/user/${userId}/support/messages`);
        const data = await res.json();
        
        if (data.success) {
          messages = data.data;
          renderMessages();
        }
      } catch (e) {
        document.getElementById('chatContainer').innerHTML = 
          '<div class="empty-chat"><div class="empty-chat-icon">❌</div><div class="empty-chat-title">Ошибка загрузки</div></div>';
      }
    }
    
    function renderMessages() {
      const container = document.getElementById('chatContainer');
      
      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-chat">
            <div class="empty-chat-icon">💬</div>
            <div class="empty-chat-title">Чат с поддержкой</div>
            <div class="empty-chat-text">
              Здесь вы можете задать любой вопрос.<br>
              Мы ответим как можно скорее!
            </div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = messages.map(msg => {
        const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const isUser = msg.sender === 'user';
        const formattedMessage = msg.message.replace(/\n/g, '<br>');
        const editedLabel = msg.edited_at ? '<span class="edited-label">изменено</span>' : '';
        
        return `
          <div class="message ${isUser ? 'user' : 'admin'}">
            ${formattedMessage}
            <div class="message-time">${editedLabel}${time}</div>
          </div>
        `;
      }).join('');
      
      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || !userId) return;
      
      // Очищаем поле сразу
      input.value = '';
      input.style.height = 'auto';
      input.focus();
      
      // Оптимистичное обновление - сразу показываем сообщение
      const tempId = 'temp_' + Date.now();
      const tempMessage = {
        id: tempId,
        message: message,
        sender: 'user',
        created_at: new Date().toISOString(),
        sending: true
      };
      messages.push(tempMessage);
      renderMessages();
      
      // Отправляем в фоне
      try {
        const res = await fetch(`/api/user/${userId}/support/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        
        const data = await res.json();
        
        if (data.success) {
          // Заменяем временное сообщение на реальное
          const idx = messages.findIndex(m => m.id === tempId);
          if (idx !== -1) messages[idx] = data.data;
        } else {
          // Убираем временное сообщение при ошибке
          messages = messages.filter(m => m.id !== tempId);
          renderMessages();
          showNotification('Ошибка отправки', 'error');
        }
      } catch (e) {
        messages = messages.filter(m => m.id !== tempId);
        renderMessages();
        showNotification('Ошибка сети', 'error');
      }
    }
    
    function showNotification(text, type = 'info') {
      const n = document.createElement('div');
      n.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(0);padding:12px 24px;border-radius:12px;color:#fff;font-size:14px;z-index:9999;background:${type === 'error' ? '#ff4444' : '#4CAF50'};transition:transform 0.2s ease-out,opacity 0.2s ease-out;touch-action:none;`;
      n.textContent = text;
      document.body.appendChild(n);
      
      let startY = 0, currentY = 0, isDragging = false;
      n.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); startY = e.touches[0].clientY; isDragging = true; n.style.transition = 'none'; }, {passive: false});
      n.addEventListener('touchmove', e => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDragging) return;
        currentY = e.touches[0].clientY - startY;
        if (currentY < 0) {
          n.style.transform = `translateX(-50%) translateY(${currentY}px)`;
          n.style.opacity = Math.max(0, 1 - Math.abs(currentY) / 100);
        }
      }, {passive: false});
      n.addEventListener('touchend', () => {
        isDragging = false;
        n.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
        if (currentY < -50) {
          n.style.transform = 'translateX(-50%) translateY(-120px)';
          n.style.opacity = '0';
          setTimeout(() => n.remove(), 250);
        } else {
          n.style.transform = 'translateX(-50%) translateY(0)';
          n.style.opacity = '1';
        }
        currentY = 0;
      });
      
      const timeout = setTimeout(() => {
        n.style.transform = 'translateX(-50%) translateY(-120px)';
        n.style.opacity = '0';
        setTimeout(() => n.remove(), 250);
      }, 3000);
      n.addEventListener('touchstart', () => clearTimeout(timeout), {once: true});
    }
    
    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }
    
    // Auto-resize textarea
    const messageInput = document.getElementById('messageInput');
    const chatContainer = document.getElementById('chatContainer');
    const sendBtn = document.getElementById('sendBtn');
    
    // Prevent keyboard from closing when tapping send button
    let touchedSendBtn = false;
    
    sendBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchedSendBtn = true;
      sendMessage();
    }, { passive: false });
    
    sendBtn.addEventListener('click', () => {
      if (touchedSendBtn) {
        touchedSendBtn = false;
        return; // Already handled by touchstart
      }
      sendMessage();
    });
    
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    
    // Scroll to bottom when focused
    messageInput.addEventListener('focus', () => {
      setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 100);
    });
    
    // Tap or scroll UP dismisses keyboard, scroll DOWN keeps it
    let touchStartY = 0;
    let isTap = true;
    let hasDismissed = false;
    
    chatContainer.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      isTap = true;
      hasDismissed = false;
    }, { passive: true });
    
    chatContainer.addEventListener('touchmove', (e) => {
      const currentY = e.touches[0].clientY;
      const moveDistance = currentY - touchStartY;
      
      if (Math.abs(moveDistance) > 10) {
        isTap = false; // It's a scroll, not a tap
        
        // Scroll UP (finger moves DOWN on screen) = dismiss keyboard instantly
        if (moveDistance > 50 && !hasDismissed && document.activeElement === messageInput) {
          hasDismissed = true;
          messageInput.blur();
        }
      }
    }, { passive: true });
    
    chatContainer.addEventListener('touchend', (e) => {
      if (isTap && (e.target === chatContainer || e.target.closest('.message'))) {
        messageInput.blur();
      }
    }, { passive: true });
    
    // Click for desktop
    chatContainer.addEventListener('click', (e) => {
      if (e.target === chatContainer || e.target.closest('.message')) {
        messageInput.blur();
      }
    });
    
    // Poll for new messages every 5 seconds
    setInterval(async () => {
      if (!userId) return;
      
      try {
        const res = await fetch(`/api/user/${userId}/support/messages`);
        const data = await res.json();
        
        if (data.success && data.data.length !== messages.length) {
          messages = data.data;
          renderMessages();
        }
      } catch (e) {
        // Silent fail
      }
    }, 5000);
    
    // Initial load - resolve userId first
    // Initial load - get userId synchronously from saved data
    userId = getUserId();
    loadMessages();
  </script>


</body>
</html>
